<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Детали заказ-наряда - Механик</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #f9fafb; min-height: 100vh; }
        .header {
            background: white; border-bottom: 1px solid #e5e7eb; padding: 16px 24px;
            display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 100;
        }
        .logo { display: flex; align-items: center; gap: 10px; font-size: 20px; font-weight: 700; color: #1f2937; }
        .logo svg { width: 28px; height: 28px; color: #10b981; }
        .user-info { display: flex; align-items: center; gap: 16px; }
        .user-badge { padding: 6px 12px; background: #10b981; color: white; border-radius: 20px; font-size: 13px; font-weight: 600; }
        .user-details { font-size: 14px; color: #6b7280; }
        .logout-btn { padding: 8px 16px; background: transparent; border: 1px solid #e5e7eb; border-radius: 6px; font-size: 14px; color: #374151; cursor: pointer; transition: all 0.2s; }
        .logout-btn:hover { background: #f3f4f6; }
        .main-content { max-width: 1200px; margin: 0 auto; padding: 24px; }
        .page-header { display: flex; align-items: center; gap: 16px; margin-bottom: 24px; flex-wrap: wrap; }
        .back-btn { padding: 10px 16px; background: white; border: 1px solid #e5e7eb; border-radius: 8px; font-size: 15px; color: #374151; cursor: pointer; display: flex; align-items: center; gap: 8px; transition: all 0.2s; }
        .back-btn:hover { background: #f3f4f6; }
        .back-btn svg { width: 18px; height: 18px; }
        .page-title { font-size: 28px; font-weight: 700; color: #1f2937; flex: 1; min-width: 200px; }
        .status-badge { padding: 8px 16px; border-radius: 20px; font-size: 14px; font-weight: 600; }
        .status-created { background: #dbeafe; color: #1e40af; }
        .status-in_progress { background: #fef3c7; color: #92400e; }
        .status-completed { background: #d1fae5; color: #065f46; }
        .form-container { background: white; border-radius: 12px; border: 1px solid #e5e7eb; padding: 32px; margin-bottom: 24px; }
        .form-section { margin-bottom: 32px; }
        .form-section-title { font-size: 20px; font-weight: 700; color: #1f2937; margin-bottom: 20px; }
        .info-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 20px; }
        .info-item { display: flex; flex-direction: column; gap: 4px; }
        .info-label { font-size: 13px; font-weight: 600; color: #6b7280; text-transform: uppercase; letter-spacing: 0.5px; }
        .info-value { font-size: 16px; color: #1f2937; }
        .work-items-section { margin-top: 24px; }
        .work-item { border: 1px solid #e5e7eb; border-radius: 8px; padding: 20px; margin-bottom: 16px; }
        .work-item-header { display: flex; align-items: center; gap: 12px; margin-bottom: 12px; }
        .work-item-checkbox { width: 20px; height: 20px; border: 2px solid #e5e7eb; border-radius: 4px; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: all 0.2s; }
        .work-item-checkbox.checked { background: #10b981; border-color: #10b981; }
        .work-item-checkbox.checked svg { display: block; }
        .work-item-checkbox svg { display: none; width: 14px; height: 14px; color: white; }
        .work-item-name { font-size: 16px; font-weight: 600; color: #1f2937; flex: 1; }
        .work-item-hours { font-size: 14px; color: #6b7280; }
        .work-item-completed { color: #10b981; text-decoration: line-through; }
        .new-work-item { border: 2px dashed #e5e7eb; border-radius: 8px; padding: 20px; margin-bottom: 20px; }
        .new-work-item-grid { display: grid; grid-template-columns: 1fr auto auto; gap: 12px; margin-bottom: 12px; }
        .new-work-item input { padding: 10px 12px; border: 1px solid #e5e7eb; border-radius: 6px; font-size: 14px; }
        .new-work-item input:focus { outline: none; border-color: #10b981; }
        .voice-btn { padding: 10px; background: #f3f4f6; border: 1px solid #e5e7eb; border-radius: 6px; cursor: pointer; transition: all 0.2s; display: flex; align-items: center; justify-content: center; }
        .voice-btn:hover { background: #e5e7eb; }
        .voice-btn.listening { background: #dcfce7; border-color: #86efac; }
        .voice-btn svg { width: 20px; height: 20px; color: #10b981; }
        .voice-btn.listening svg { animation: pulse 1s infinite; }
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.5; } 100% { opacity: 1; } }
        .btn { padding: 12px 24px; background: #10b981; color: white; border: none; border-radius: 8px; font-size: 15px; font-weight: 600; cursor: pointer; display: inline-flex; align-items: center; gap: 8px; transition: all 0.2s; }
        .btn:hover { background: #059669; transform: translateY(-1px); }
        .btn:active { transform: translateY(0); }
        .btn:disabled { opacity: 0.6; cursor: not-allowed; }
        .btn-secondary { background: white; border: 1px solid #e5e7eb; color: #374151; }
        .btn-secondary:hover { background: #f3f4f6; }
        .btn-icon { width: 18px; height: 18px; }
        .photos-section { margin-top: 24px; }
        .photo-upload-area { border: 2px dashed #e5e7eb; border-radius: 8px; padding: 32px; text-align: center; cursor: pointer; transition: all 0.2s; margin-bottom: 20px; }
        .photo-upload-area:hover { border-color: #10b981; background: #f0fdf4; }
        .photo-upload-area svg { width: 48px; height: 48px; color: #d1d5db; margin-bottom: 12px; }
        .photo-upload-area p { color: #6b7280; font-size: 15px; }
        .photo-upload-area span { font-size: 13px; color: #9ca3af; display: block; margin-top: 4px; }
        .photos-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(120px, 1fr)); gap: 16px; }
        .photo-item { position: relative; border-radius: 8px; overflow: hidden; }
        .photo-item img { width: 100%; height: 120px; object-fit: cover; display: block; }
        .photo-remove-btn { position: absolute; top: 8px; right: 8px; width: 28px; height: 28px; background: rgba(239, 68, 68, 0.9); border: none; border-radius: 50%; color: white; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: all 0.2s; }
        .photo-remove-btn:hover { background: #ef4444; transform: scale(1.1); }
        .photo-remove-btn svg { width: 14px; height: 14px; }
        .recommendations-section { margin-top: 24px; }
        .recommendations-textarea { width: 100%; min-height: 120px; padding: 14px 16px; border: 1px solid #e5e7eb; border-radius: 8px; font-size: 15px; font-family: inherit; resize: vertical; }
        .recommendations-textarea:focus { outline: none; border-color: #10b981; box-shadow: 0 0 0 3px rgba(16, 185, 129, 0.1); }
        .form-actions { display: flex; justify-content: flex-end; margin-top: 32px; }
        @media (max-width: 768px) {
            .header { padding: 12px 16px; }
            .main-content { padding: 16px; }
            .page-header { flex-direction: column; align-items: flex-start; }
            .info-grid { grid-template-columns: 1fr; }
            .new-work-item-grid { grid-template-columns: 1fr; }
            .new-work-item input { width: 100%; margin-bottom: 8px; }
            .new-work-item .voice-btn { width: 100%; }
            .form-actions { flex-direction: column; gap: 12px; }
            .form-actions .btn { width: 100%; }
        }
    </style>
</head>
<body>
    <header class="header">
        <div class="logo">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M19 17h-2a1 1 0 0 0-1 1v2a1 1 0 0 0 1 1h2a1 1 0 0 0 1-1v-2a1 1 0 0 0-1-1zM9 1h8a4 4 0 0 1 4 4v6a4 4 0 0 1-4 4H9a4 4 0 0 1-4-4V5a4 4 0 0 1 4-4z"/>
                <path d="M10 5a2 2 0 0 0-2 2v4a2 2 0 0 0 2 2h4a2 2 0 0 0 2-2V7a2 2 0 0 0-2-2h-4z"/>
                <circle cx="15" cy="17" r="2"/><circle cx="9" cy="17" r="2"/>
            </svg>
            Заказ-наряд
        </div>
        <div class="user-info">
            <span class="user-badge">Механик</span>
            <span class="user-details" id="user-details"></span>
            <button class="logout-btn" onclick="logout()">Выйти</button>
        </div>
    </header>
    <main class="main-content">
        <div class="page-header">
            <a href="dashboard.html" class="back-btn">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
                Назад
            </a>
            <h1 class="page-title" id="order-title">Загрузка...</h1>
            <span class="status-badge" id="status-badge"></span>
        </div>
        <div class="form-container">
            <div class="form-section">
                <h2 class="form-section-title">Данные заказ-наряда</h2>
                <div class="info-grid" id="order-info"></div>
            </div>
            <div class="form-section">
                <h2 class="form-section-title">Список работ</h2>
                <div class="work-items-section" id="work-items-container"></div>
                <div class="new-work-item">
                    <h4 style="margin-bottom: 12px; font-size: 15px; font-weight: 600; color: #1f2937;">Добавить новую работу</h4>
                    <div class="new-work-item-grid">
                        <input type="text" id="new-work-name" placeholder="Название работы">
                        <input type="number" id="new-work-hours" placeholder="Часы" step="0.5" min="0">
                        <button type="button" class="voice-btn" id="voice-btn" onclick="toggleVoiceInput()">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/>
                                <path d="M19 10v2a7 7 0 0 1-14 0v-2"/>
                                <line x1="12" y1="19" x2="12" y2="23"/>
                                <line x1="8" y1="23" x2="16" y2="23"/>
                            </svg>
                        </button>
                    </div>
                    <button type="button" class="btn btn-secondary" onclick="addWorkItem()" style="width: 100%; margin-top: 12px;">Добавить работу</button>
                </div>
            </div>
            <div class="form-section">
                <h2 class="form-section-title">Фото и рекомендации</h2>
                <div class="photos-section">
                    <div class="photo-upload-area" onclick="document.getElementById('photo-input').click()">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                            <path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/>
                            <circle cx="12" cy="13" r="4"/>
                        </svg>
                        <p>Загрузите фото с телефона</p>
                        <span>Нажмите или перетащите файлы</span>
                        <input type="file" id="photo-input" accept="image/*" multiple style="display: none;" onchange="handlePhotoUpload(event)">
                    </div>
                    <div class="photos-grid" id="photos-grid"></div>
                </div>
                <div class="recommendations-section">
                    <label style="display: block; font-size: 14px; font-weight: 600; color: #374151; margin-bottom: 8px;">Рекомендации</label>
                    <textarea class="recommendations-textarea" id="recommendations" placeholder="Введите рекомендации по ремонту..."></textarea>
                </div>
            </div>
            <div class="form-actions">
                <button type="button" class="btn" id="complete-btn" onclick="completeAllWorks()" disabled>Отметить все работы выполненными</button>
            </div>
        </div>
    </main>
    <script>
        const mockUsers = [
            { id: '1', name: 'Иван Иванов', role: 'master', employeeId: 'M001' },
            { id: '2', name: 'Петр Петров', role: 'master', employeeId: 'M002' },
            { id: '3', name: 'Алексей Сидоров', role: 'mechanic', employeeId: 'MECH001' },
            { id: '4', name: 'Дмитрий Кузнецов', role: 'mechanic', employeeId: 'MECH002' }
        ];
        const user = JSON.parse(localStorage.getItem('workOrderUser'));
        if (!user || user.role !== 'mechanic') window.location.href = '../index.html';
        document.getElementById('user-details').textContent = `${user.name} (${user.employeeId})`;
        const urlParams = new URLSearchParams(window.location.search);
        const orderId = urlParams.get('id');
        let workOrders = JSON.parse(localStorage.getItem('workOrders')) || [];
        if (workOrders.length === 0) {
            workOrders = [{
                id: '1', orderNumber: 'ЗН-2026-001', createdAt: '2026-06-28', carBrand: 'Toyota', carModel: 'Camry',
                vin: 'JT1BD22K1W0123456', licensePlate: 'А123БВ', mileage: 45000, clientName: 'Сергей Волков',
                masterId: '1', mechanicId: user.id, status: 'in_progress', partsSource: 'ours',
                workItems: [{ id: '1', name: 'Замена масла', laborHours: 1, isCompleted: false }, { id: '2', name: 'Замена тормозных колодок', laborHours: 2, isCompleted: false }]
            }];
        }
        let order = workOrders.find(wo => wo.id === orderId);
        let photos = [];
        let recommendations = '';
        if (!order) {
            document.getElementById('order-title').textContent = 'Заказ-наряд не найден';
        } else {
            document.getElementById('order-title').textContent = `Заказ-наряд #${order.orderNumber}`;
            const statusBadge = document.getElementById('status-badge');
            const statusText = order.status === 'created' ? 'Создан' : order.status === 'in_progress' ? 'В работе' : 'Выполнен';
            const statusClass = order.status === 'created' ? 'status-created' : order.status === 'in_progress' ? 'status-in_progress' : 'status-completed';
            statusBadge.textContent = statusText; statusBadge.className = `status-badge ${statusClass}`;
            const masterName = mockUsers.find(u => u.id === order.masterId)?.name || 'Неизвестно';
            const partsSourceText = order.partsSource === 'ours' ? 'Наши' : 'Клиента';
            document.getElementById('order-info').innerHTML = `
                <div class="info-item"><span class="info-label">Номер заказ-наряда</span><span class="info-value">#${order.orderNumber}</span></div>
                <div class="info-item"><span class="info-label">Дата создания</span><span class="info-value">${order.createdAt}</span></div>
                <div class="info-item"><span class="info-label">Мастер-приемщик</span><span class="info-value">${masterName}</span></div>
                <div class="info-item"><span class="info-label">Марка и модель</span><span class="info-value">${order.carBrand} ${order.carModel}</span></div>
                <div class="info-item"><span class="info-label">VIN</span><span class="info-value">${order.vin}</span></div>
                <div class="info-item"><span class="info-label">Гос. номер</span><span class="info-value">${order.licensePlate}</span></div>
                <div class="info-item"><span class="info-label">Пробег</span><span class="info-value">${order.mileage} км</span></div>
                <div class="info-item"><span class="info-label">Клиент</span><span class="info-value">${order.clientName}</span></div>
                <div class="info-item"><span class="info-label">Запчасти</span><span class="info-value">${partsSourceText}</span></div>`;
            if (order.mechanicPhotoUrls) photos = order.mechanicPhotoUrls;
            if (order.mechanicRecommendations) { recommendations = order.mechanicRecommendations; document.getElementById('recommendations').value = recommendations; }
            renderWorkItems(); renderPhotos(); updateCompleteButton();
        }
        function renderWorkItems() {
            const container = document.getElementById('work-items-container');
            container.innerHTML = '';
            order.workItems.forEach(work => {
                const div = document.createElement('div');
                div.className = 'work-item';
                const isCompleted = work.isCompleted;
                const checkboxClass = isCompleted ? 'work-item-checkbox checked' : 'work-item-checkbox';
                const nameClass = isCompleted ? 'work-item-name work-item-completed' : 'work-item-name';
                div.innerHTML = `
                    <div class="work-item-header">
                        <div class="${checkboxClass}" onclick="toggleWorkItem('${work.id}')">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><path d="M20 6L9 17l-5-5"/></svg>
                        </div>
                        <span class="${nameClass}">${work.name}</span>
                        <span class="work-item-hours">${work.laborHours} ч</span>
                    </div>`;
                container.appendChild(div);
            });
        }
        function toggleWorkItem(workId) {
            const work = order.workItems.find(wi => wi.id === workId);
            if (work) { work.isCompleted = !work.isCompleted; renderWorkItems(); updateCompleteButton(); saveOrder(); }
        }
        function addWorkItem() {
            const name = document.getElementById('new-work-name').value;
            const hours = parseFloat(document.getElementById('new-work-hours').value) || 0;
            if (!name) return;
            order.workItems.push({ id: Date.now().toString(), name: name, laborHours: hours, isCompleted: false });
            document.getElementById('new-work-name').value = ''; document.getElementById('new-work-hours').value = '';
            renderWorkItems(); saveOrder();
        }
        function toggleVoiceInput() {
            const voiceBtn = document.getElementById('voice-btn');
            voiceBtn.classList.toggle('listening');
            if (voiceBtn.classList.contains('listening')) {
                setTimeout(() => { document.getElementById('new-work-name').value = 'Новая работа (голосом)'; voiceBtn.classList.remove('listening'); }, 2000);
            }
        }
        function handlePhotoUpload(event) { photos = [...photos, ...Array.from(event.target.files)]; renderPhotos(); saveOrder(); event.target.value = ''; }
        function renderPhotos() {
            const grid = document.getElementById('photos-grid');
            grid.innerHTML = '';
            photos.forEach((photo, index) => {
                const div = document.createElement('div');
                div.className = 'photo-item';
                const photoUrl = typeof photo === 'string' ? photo : URL.createObjectURL(photo);
                div.innerHTML = `<img src="${photoUrl}" alt="Фото ${index + 1}"><button class="photo-remove-btn" onclick="removePhoto(${index})"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 6h18M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></svg></button>`;
                grid.appendChild(div);
            });
        }
        function removePhoto(index) { photos.splice(index, 1); renderPhotos(); saveOrder(); }
        function updateCompleteButton() {
            const btn = document.getElementById('complete-btn');
            const allCompleted = order.workItems.every(wi => wi.isCompleted);
            btn.disabled = !(allCompleted && order.status !== 'completed');
        }
        function completeAllWorks() {
            order.workItems.forEach(wi => wi.isCompleted = true);
            order.status = 'completed';
            order.mechanicRecommendations = document.getElementById('recommendations').value;
            order.mechanicPhotoUrls = photos.map(p => typeof p === 'string' ? p : URL.createObjectURL(p));
            renderWorkItems(); updateCompleteButton(); saveOrder();
            document.getElementById('status-badge').textContent = 'Выполнен';
            document.getElementById('status-badge').className = 'status-badge status-completed';
            alert('Все работы отмечены выполненными!');
        }
        function saveOrder() {
            const index = workOrders.findIndex(wo => wo.id === order.id);
            if (index !== -1) { workOrders[index] = order; localStorage.setItem('workOrders', JSON.stringify(workOrders)); }
        }
        function logout() { localStorage.removeItem('workOrderUser'); window.location.href = '../index.html'; }
    </script>
</body>
</html>
