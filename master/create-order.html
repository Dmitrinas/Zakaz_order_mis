<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Создать заказ-наряд</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #f9fafb; min-height: 100vh; }
        .header {
            background: white; border-bottom: 1px solid #e5e7eb; padding: 16px 24px;
            display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 100;
        }
        .logo { display: flex; align-items: center; gap: 10px; font-size: 20px; font-weight: 700; color: #1f2937; }
        .logo svg { width: 28px; height: 28px; color: #6366f1; }
        .user-info { display: flex; align-items: center; gap: 16px; }
        .user-badge { padding: 6px 12px; background: #6366f1; color: white; border-radius: 20px; font-size: 13px; font-weight: 600; }
        .user-details { font-size: 14px; color: #6b7280; }
        .logout-btn { padding: 8px 16px; background: transparent; border: 1px solid #e5e7eb; border-radius: 6px; font-size: 14px; color: #374151; cursor: pointer; transition: all 0.2s; }
        .logout-btn:hover { background: #f3f4f6; }
        .main-content { max-width: 1200px; margin: 0 auto; padding: 24px; }
        .page-header { display: flex; align-items: center; gap: 16px; margin-bottom: 24px; }
        .back-btn { padding: 10px 16px; background: white; border: 1px solid #e5e7eb; border-radius: 8px; font-size: 15px; color: #374151; cursor: pointer; display: flex; align-items: center; gap: 8px; transition: all 0.2s; }
        .back-btn:hover { background: #f3f4f6; }
        .back-btn svg { width: 18px; height: 18px; }
        .page-title { font-size: 28px; font-weight: 700; color: #1f2937; }
        .form-container { background: white; border-radius: 12px; border: 1px solid #e5e7eb; padding: 32px; margin-bottom: 24px; }
        .form-section { margin-bottom: 32px; }
        .form-section-title { font-size: 20px; font-weight: 700; color: #1f2937; margin-bottom: 20px; padding-bottom: 12px; border-bottom: 1px solid #e5e7eb; }
        .form-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 20px; }
        .form-group { margin-bottom: 16px; }
        .form-group label { display: block; font-size: 14px; font-weight: 600; color: #374151; margin-bottom: 8px; }
        .form-group input, .form-group select { width: 100%; padding: 12px 14px; border: 1px solid #e5e7eb; border-radius: 8px; font-size: 15px; color: #1f2937; transition: border-color 0.2s, box-shadow 0.2s; }
        .form-group input:focus, .form-group select:focus { outline: none; border-color: #6366f1; box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.1); }
        .btn { padding: 12px 24px; background: #6366f1; color: white; border: none; border-radius: 8px; font-size: 15px; font-weight: 600; cursor: pointer; display: inline-flex; align-items: center; gap: 8px; transition: all 0.2s; }
        .btn:hover { background: #5558e3; transform: translateY(-1px); }
        .btn:active { transform: translateY(0); }
        .btn-secondary { background: white; border: 1px solid #e5e7eb; color: #374151; }
        .btn-secondary:hover { background: #f3f4f6; }
        .btn-danger { background: #ef4444; }
        .btn-danger:hover { background: #dc2626; }
        .btn-icon { width: 18px; height: 18px; }
        .work-item { border: 1px solid #e5e7eb; border-radius: 8px; padding: 20px; margin-bottom: 16px; }
        .work-item-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 16px; }
        .work-item input { width: 100%; }
        .add-work-btn { width: 100%; justify-content: center; margin-top: 16px; }
        .form-actions { display: flex; justify-content: flex-end; margin-top: 32px; }
        @media (max-width: 768px) {
            .header { padding: 12px 16px; }
            .main-content { padding: 16px; }
            .form-container { padding: 20px; }
            .form-grid { grid-template-columns: 1fr; }
            .work-item-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
    <header class="header">
        <div class="logo">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M19 17h-2a1 1 0 0 0-1 1v2a1 1 0 0 0 1 1h2a1 1 0 0 0 1-1v-2a1 1 0 0 0-1-1zM9 1h8a4 4 0 0 1 4 4v6a4 4 0 0 1-4 4H9a4 4 0 0 1-4-4V5a4 4 0 0 1 4-4z"/>
                <path d="M10 5a2 2 0 0 0-2 2v4a2 2 0 0 0 2 2h4a2 2 0 0 0 2-2V7a2 2 0 0 0-2-2h-4z"/>
                <circle cx="15" cy="17" r="2"/><circle cx="9" cy="17" r="2"/>
            </svg>
            Заказ-наряд
        </div>
        <div class="user-info">
            <span class="user-badge">Мастер</span>
            <span class="user-details" id="user-details"></span>
            <button class="logout-btn" onclick="logout()">Выйти</button>
        </div>
    </header>
    <main class="main-content">
        <div class="page-header">
            <a href="dashboard.html" class="back-btn">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
                Назад
            </a>
            <h1 class="page-title">Создать заказ-наряд</h1>
        </div>
        <div class="form-container">
            <form id="create-order-form">
                <div class="form-section">
                    <h2 class="form-section-title">Данные заказ-наряда</h2>
                    <div class="form-grid">
                        <div class="form-group">
                            <label for="orderNumber">Номер заказ-наряда</label>
                            <input type="text" id="orderNumber" placeholder="ЗН-2026-XXX" required>
                        </div>
                        <div class="form-group">
                            <label for="createdAt">Дата создания</label>
                            <input type="date" id="createdAt" value="" readonly class="bg-gray-50">
                        </div>
                    </div>
                </div>
                <div class="form-section">
                    <h2 class="form-section-title">Данные автомобиля</h2>
                    <div class="form-grid">
                        <div class="form-group"><label for="carBrand">Марка автомобиля</label><input type="text" id="carBrand" placeholder="Toyota" required></div>
                        <div class="form-group"><label for="carModel">Модель</label><input type="text" id="carModel" placeholder="Camry" required></div>
                        <div class="form-group"><label for="vin">VIN</label><input type="text" id="vin" placeholder="JT1BD22K1W0123456"></div>
                        <div class="form-group"><label for="licensePlate">Гос. номер</label><input type="text" id="licensePlate" placeholder="А123БВ"></div>
                        <div class="form-group"><label for="mileage">Пробег (км)</label><input type="number" id="mileage" placeholder="45000" min="0"></div>
                    </div>
                </div>
                <div class="form-section">
                    <h2 class="form-section-title">Данные клиента</h2>
                    <div class="form-grid">
                        <div class="form-group"><label for="clientName">ФИО клиента</label><input type="text" id="clientName" placeholder="Иванов Иван Иванович" required></div>
                        <div class="form-group">
                            <label for="partsSource">Запчасти</label>
                            <select id="partsSource" required>
                                <option value="" disabled selected>Выберите источник</option>
                                <option value="ours">Наши запчасти</option>
                                <option value="client">Запчасти клиента</option>
                            </select>
                        </div>
                    </div>
                </div>
                <div class="form-section">
                    <h2 class="form-section-title">Список работ</h2>
                    <div id="work-items-container" class="work-items-section"></div>
                    <button type="button" class="btn btn-secondary add-work-btn" onclick="addWorkItem()">
                        <svg class="btn-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 5v14M5 12h14"/></svg>
                        Добавить работу
                    </button>
                </div>
                <div class="form-actions">
                    <button type="submit" class="btn">
                        <svg class="btn-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><path d="M22 4L12 14.01l-3-3"/></svg>
                        Создать заказ-наряд
                    </button>
                </div>
            </form>
        </div>
    </main>
    <script>
        const user = JSON.parse(localStorage.getItem('workOrderUser'));
        if (!user || user.role !== 'master') window.location.href = '../index.html';
        document.getElementById('user-details').textContent = `${user.name} (${user.employeeId})`;
        document.getElementById('createdAt').value = new Date().toISOString().split('T')[0];
        let workItems = [{ name: '', laborHours: 0 }];
        function renderWorkItems() {
            const container = document.getElementById('work-items-container');
            container.innerHTML = '';
            workItems.forEach((item, index) => {
                const div = document.createElement('div');
                div.className = 'work-item';
                div.innerHTML = `
                    <div class="work-item-grid">
                        <div class="form-group"><label>Название работы</label><input type="text" placeholder="Замена масла" value="${item.name}" onchange="updateWorkItem(${index}, 'name', this.value)" required></div>
                        <div class="form-group"><label>Трудоёмкость (часы)</label><input type="number" step="0.5" min="0" placeholder="1" value="${item.laborHours}" onchange="updateWorkItem(${index}, 'laborHours', parseFloat(this.value) || 0)" required></div>
                    </div>
                    <button type="button" class="btn btn-danger" onclick="removeWorkItem(${index})" style="width: auto; margin-top: 10px;">
                        <svg class="btn-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 6h18M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></svg>
                        Удалить
                    </button>`;
                container.appendChild(div);
            });
        }
        function addWorkItem() { workItems.push({ name: '', laborHours: 0 }); renderWorkItems(); }
        function removeWorkItem(index) { if (workItems.length <= 1) return; workItems.splice(index, 1); renderWorkItems(); }
        function updateWorkItem(index, field, value) { workItems[index][field] = value; }
        renderWorkItems();
        document.getElementById('create-order-form').addEventListener('submit', function(e) {
            e.preventDefault();
            const orderData = {
                id: Date.now().toString(),
                orderNumber: document.getElementById('orderNumber').value,
                createdAt: document.getElementById('createdAt').value,
                carBrand: document.getElementById('carBrand').value,
                carModel: document.getElementById('carModel').value,
                vin: document.getElementById('vin').value,
                licensePlate: document.getElementById('licensePlate').value,
                mileage: parseInt(document.getElementById('mileage').value) || 0,
                clientName: document.getElementById('clientName').value,
                masterId: user.id,
                mechanicId: null,
                status: 'created',
                partsSource: document.getElementById('partsSource').value,
                workItems: workItems.map((wi, i) => ({ id: (i+1).toString(), name: wi.name, laborHours: wi.laborHours, isCompleted: false }))
            };
            const existingOrders = JSON.parse(localStorage.getItem('workOrders')) || [];
            existingOrders.push(orderData);
            localStorage.setItem('workOrders', JSON.stringify(existingOrders));
            window.location.href = 'dashboard.html';
        });
        function logout() { localStorage.removeItem('workOrderUser'); window.location.href = '../index.html'; }
    </script>
</body>
</html>
